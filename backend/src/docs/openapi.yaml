openapi: 3.0.0
info:
  title: Cafe Ordering System API
  version: 1.0.0
  description: API for the Cafe Ordering System - Manage products, orders, and staff

servers:
  - url: http://localhost:5000/api/v1
    description: Local development server
  - url: https://cafe-ordering-system-rp77.onrender.com/api/v1
    description: Production server

paths:
  /auth/login:
    post:
      summary: User login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      summary: Refresh token
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token refreshed successfully
        '401':
          description: Invalid or expired token

  /products:
    get:
      summary: Get all products
      tags:
        - Products
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, out_of_stock, archived]
        - in: query
          name: category_id
          schema:
            type: string
            format: uuid
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /orders:
    get:
      summary: Get all orders
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: List of orders with pagination

    post:
      summary: Create new order
      tags:
        - Orders
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateOrder'
      responses:
        '201':
          description: Order created successfully

  /orders/track/{order_number}:
    get:
      summary: Track order by number
      tags:
        - Orders
      parameters:
        - in: path
          name: order_number
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order details
        '404':
          description: Order not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
        stock:
          type: integer
        status:
          type: string
        image_url:
          type: string

    CreateOrder:
      type: object
      required:
        - customer_name
        - items
        - total_amount
        - payment_method
      properties:
        customer_name:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              quantity:
                type: integer
              price:
                type: number
        total_amount:
          type: number
        payment_method:
          type: string
          enum: [Cash, GCash, Maya, Card, Cash on Delivery]
        order_type:
          type: string
          enum: [Pickup, Delivery, Dine-in]
        address:
          type: string
        contact_number:
          type: string